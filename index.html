<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Politie Academie - Tekstbeheersing</title>
    <style>
        :root {
            --police-blue: #1c2b4a;
            --police-gold: #c5a059;
            --bg-gray: #f4f4f4;
            --alert-red: #cc0000;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-gray);
            color: var(--police-blue);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background: var(--police-blue);
            color: white;
            width: 100%;
            padding: 1rem;
            text-align: center;
            border-bottom: 4px solid var(--police-gold);
        }

        .container {
            width: 90%;
            max-width: 800px;
            margin-top: 2rem;
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }

        .hidden { display: none; }

        input, select, button, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        button {
            background: var(--police-blue);
            color: white;
            cursor: pointer;
            border: none;
            font-weight: bold;
        }

        .btn-gold { background: var(--police-gold); }
        .btn-reset { background: var(--alert-red); margin-top: 20px; }

        .sentence-box {
            background: #eef2f7;
            padding: 1.5rem;
            border-left: 5px solid var(--police-gold);
            margin-bottom: 1.5rem;
            font-style: italic;
            font-weight: bold;
        }

        .feedback-item {
            border-bottom: 1px solid #ddd;
            padding: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .vote-btns { display: flex; align-items: center; gap: 8px; }
        .vote-btns button { width: auto; padding: 5px 10px; background: #e0e0e0; color: #333; }
    </style>
</head>
<body>

<header>
    <h1>Opleiding GGP - Correct Rapporteren</h1>
</header>

<div class="container">
    <div id="login-screen">
        <h3>Aanmelden Student</h3>
        <input type="text" id="username" placeholder="Voornaam">
        <select id="class-select">
            <option value="delta">Delta</option>
            <option value="echo">Echo</option>
            <option value="foxtrot">Foxtrot</option>
            <option value="golf">Golf</option>
            <option value="hotel">Hotel</option>
            <option value="juliett">Juliett</option>
            <option value="lima">Lima</option>
            <option value="mike">Mike</option>
        </select>
        <button id="btn-login">Start Training</button>
        <hr>
        <button id="btn-teacher-mode" style="background:none; color: gray; font-size: 0.8rem;">Docent Log-in</button>
    </div>

    <div id="lesson-screen" class="hidden">
        <div id="progress">Scherm <span id="current-num">1</span></div>
        <div class="sentence-box" id="wrong-sentence">Laden...</div>
        
        <textarea id="correction-input" placeholder="Verbeter de bovenstaande zin..." rows="3"></textarea>
        <button id="btn-submit">Verzend Correctie</button>

        <h4>Correcties van collega's (<span id="my-class-label"></span>)</h4>
        <div id="peer-feedback-list"></div>
    </div>

    <div id="teacher-controls" class="hidden">
        <h3>Docentenpaneel (Bediening)</h3>
        <p>Huidige zin: <strong id="admin-step-label">1</strong></p>
        <button id="btn-prev">Vorige Scherm</button>
        <button id="btn-next" class="btn-gold">Volgende Scherm</button>
        
        <button id="btn-reset" class="btn-reset">RESET SESSIE (Wis alles)</button>
        <p style="font-size: 0.7rem; color: gray;">* Reset zet de teller op 1 en verwijdert alle ingezonden teksten.</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, runTransaction, remove } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC-Of0AUOd-kVo2RKxYc-68Gr-RO4HdRk0",
        authDomain: "q2aangifteles2.firebaseapp.com",
        databaseURL: "https://q2aangifteles2-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "q2aangifteles2",
        storageBucket: "q2aangifteles2.firebasestorage.app",
        messagingSenderId: "696806554615",
        appId: "1:696806554615:web:bd877b1caee23c5283ccf2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const zinnen = [
        "De verdachte reed hard.",
        "Het slachtoffer had veel pijn.",
        "De verdachte droeg donkere kleding.",
        "Het was een grote groep mensen.",
        "De verdachte was erg boos.",
        "De man met de hond die blafte.",
        "De gevonden sleutels van de auto.",
        "De fiets van de man die gestolen was.",
        "De politieagent zag de dief met het mes.",
        "Hij zag de man met de verrekijker."
    ];

    let currentUser = "";
    let currentClass = "";

    // --- NAVIGATIE & INLOG ---
    document.getElementById('btn-login').onclick = () => {
        currentUser = document.getElementById('username').value.trim();
        currentClass = document.getElementById('class-select').value;
        if(!currentUser) return alert("Naam invullen a.u.b.");
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('lesson-screen').classList.remove('hidden');
        document.getElementById('my-class-label').innerText = currentClass;
        initSync();
    };

    document.getElementById('btn-teacher-mode').onclick = () => {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('teacher-controls').classList.remove('hidden');
        initSync();
    };

    // --- DOCENT ACTIES ---
    document.getElementById('btn-next').onclick = () => changeStep(1);
    document.getElementById('btn-prev').onclick = () => changeStep(-1);
    
    document.getElementById('btn-reset').onclick = async () => {
        if(confirm("Weet je zeker dat je de sessie wilt resetten? Alle antwoorden worden gewist.")) {
            await set(ref(db, 'session/currentStep'), 0);
            await remove(ref(db, 'corrections'));
            alert("Sessie gereset.");
        }
    };

    function changeStep(delta) {
        runTransaction(ref(db, 'session/currentStep'), (current) => {
            let next = (current || 0) + delta;
            if(next < 0) next = 0;
            if(next >= zinnen.length) next = zinnen.length - 1;
            return next;
        });
    }

    // --- SYNC & FEEDBACK ---
    function initSync() {
        onValue(ref(db, 'session/currentStep'), (snapshot) => {
            const step = snapshot.val() || 0;
            document.getElementById('current-num').innerText = step + 1;
            document.getElementById('admin-step-label').innerText = step + 1;
            document.getElementById('wrong-sentence').innerText = zinnen[step];
            document.getElementById('correction-input').value = "";
            loadFeedback(step);
        });
    }

    document.getElementById('btn-submit').onclick = () => {
        const text = document.getElementById('correction-input').value.trim();
        if(!text) return;
        onValue(ref(db, 'session/currentStep'), (snap) => {
            const step = snap.val() || 0;
            set(ref(db, `corrections/${step}/${currentClass}/${currentUser}`), {
                text: text,
                votes: 0
            });
        }, { onlyOnce: true });
    };

    function loadFeedback(step) {
        onValue(ref(db, `corrections/${step}/${currentClass}`), (snap) => {
            const list = document.getElementById('peer-feedback-list');
            list.innerHTML = "";
            const data = snap.val();
            for(let user in data) {
                if(user === currentUser) continue;
                const div = document.createElement('div');
                div.className = 'feedback-item';
                div.innerHTML = `
                    <span><strong>${user}:</strong> ${data[user].text}</span>
                    <div class="vote-btns">
                        <span>${data[user].votes || 0}</span>
                        <button onclick="window.vote('${step}','${user}',1)">👍</button>
                        <button onclick="window.vote('${step}','${user}',-1)">👎</button>
                    </div>
                `;
                list.appendChild(div);
            }
        });
    }

    window.vote = (step, target, val) => {
        runTransaction(ref(db, `corrections/${step}/${currentClass}/${target}/votes`), (c) => (c || 0) + val);
    };
</script>
</body>
</html>
